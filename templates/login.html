{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

{% if error %}
    <p>{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Email</label><br>
    <input type="email" name="user_email"><br><br>

    <label>Password</label><br>
    <input type="password" name="user_password"><br><br>

    <button type="submit">Login</button>
</form>

{% form %}
