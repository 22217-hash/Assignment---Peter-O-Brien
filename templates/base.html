<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wellington College Event Booking</title>

    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            background-color: lightgray;
            margin: 0;
        }

        h1 {
            background-color: steelblue;
            color: white;
            padding: 15px;
            margin: 0;
        }

        .nav {
            margin-right: 12px;
            color: darkblue;
            font-weight: bold;
        }

        body {
            padding: 10px;
        }

        .form-group{
            margin-bottom: 12px;
        }

        .form-label{
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 6px;
        }

        button {
            padding: 7px 12px;
            background-color: steelblue;
            color: white;
            border: none;
        }

        .page-box {
            background-color: white;
            border: 1px solid grey;
            padding: 15px;
            margin: 10px;
            width: 300px;
        }

        .event-container {
        padding: 10px}

    </style>
</head>
<body>

    <h1>Event Website</h1>

    <a href="/">Home</a>
    {% if session.get('user_id') == None %}
    <a href="/signup">Sign Up</a>
    <a href="/login">Login</a>
    {% endif %}

    {% if session.get("role") == "admin" %}
         <a href="/add_event">Add Event</a>
    {% endif %}

    {% if session.get('user_id') !=None %}
    <a href="/my_bookings">My Bookings</a>
    <a href="/logout">Logout</a>
    {% endif %}

    <hr>

    {% block content %}{% endblock %}

</body>
</html>
