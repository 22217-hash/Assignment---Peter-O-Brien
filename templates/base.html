<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wellington College Event Booking</title>

    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            background-color: lightgray;
            margin: 0;
            padding: 1rem;
        }

        h1 {
            text-align: center;
            font-weight: normal;
            font-size: 2.5rem;
            padding: 1rem;
            color: white;
            background-color: steelblue;
        }

        h2 {
            text-align: center;
            font-size: 1rem;
            margin: 1rem;
        }

        .nav {
            background-color: whitesmoke;
            text-align: center;
            padding: 0.7rem;
        }

        .nav a {
            margin: 0.5rem;
            color: darkblue;
            font-weight: bold;
            text-decoration: none;
        }

        .nav a:hover {
            border-bottom: 0.12rem solid steelblue;
        }

        .event-container {
            width: 70rem;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
        }

        .page-box {
            background-color: white;
            border: 0.06rem solid gray;
            width: 30rem;
            padding: 1rem;
            margin: 0.7rem;
        }

        .form-group {
            margin-bottom: 0.8rem;
        }

        .form-label {
            font-weight: bold;
            margin-bottom: 0.2rem;
        }

        input, textarea, select {
            width: 15rem;
            padding: 0.4rem;
            margin-top: 0.2rem;
        }

        textarea {
            height: 5rem;
        }

        button {
            padding: 0.5rem 0.8rem;
            background-color: steelblue;
            color: white;
            border: none;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: blue;
        }

        a {
            color: darkblue;
        }

        @media only screen and (max-width: 900px) {
            .event-container {
                width: 100%;
            }

            .page-box {
                width: 90%;
            }
        }

        .button-group {
            margin-top: 1rem;
            text-align: center;
        }

        .book-bin {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: steelblue;
            color: white !important;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: bold;
        }

        .book-bin:hover {
            background-color: royalblue;
        }

    </style>
</head>
<body>

<div class="nav">

    <div class="nav-left">
        <a href="/">Wellington College Event Booking</a>
    </div>

    <div class="nav-right">
        <a href="/">Home</a>

        {% if session.get('user_id') == None %}
            <a href="/signup">Sign Up</a>
            <a href="/login">Login</a>
        {% endif %}

        {% if session.get("role") == "admin" %}
            <a href="/add_event">Add Event</a>
        {% endif %}

        {% if session.get('user_id') !=None %}
            <a href="/my_bookings">My Bookings</a>
            <a href="/logout">Logout</a>
        {% endif %}
    </div>

</div>

    <hr>

    {% block content %}{% endblock %}

</body>
</html>
