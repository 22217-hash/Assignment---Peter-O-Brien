<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wellington College Event Booking</title>

    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            background-color: lightgray;
            margin: 0;
            padding: 1rem;
        }

        h1 {
            background-color: steelblue;
            color: white;
            padding: 1rem;
            margin: 0;
        }

        .nav {
            margin-right: 0.75rem;
            color: darkblue;
            font-weight: bold;
        }

        body {
            padding: 0.75rem;
        }

        .form-group{
            margin-bottom: 12px;
        }

        .form-label{
            font-weight: bold;
        }

        input, textarea, select {
            width: 15rem;
            padding: 0.4rem;
        }

        button {
            padding: 7px 12px;
            background-color: steelblue;
            color: white;
            border: none;
        }

        .page-box {
            background-color: white;
            border: 0.06rem solid grey;
            padding: 1rem;
            margin: 0.6rem;
            width: 18rem;
        }

        .event-container {
            padding: 0.6rem
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

    </style>
</head>
<body>

    <h1>Event Website</h1>

    <a href="/">Home</a>
    {% if session.get('user_id') == None %}
    <a href="/signup">Sign Up</a>
    <a href="/login">Login</a>
    {% endif %}

    {% if session.get("role") == "admin" %}
         <a href="/add_event">Add Event</a>
    {% endif %}

    {% if session.get('user_id') !=None %}
    <a href="/my_bookings">My Bookings</a>
    <a href="/logout">Logout</a>
    {% endif %}

    <hr>

    {% block content %}{% endblock %}

</body>
</html>
